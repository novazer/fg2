<ion-card>
  <ion-card-header>
    <ion-card-title>{{ 'diary.entriesReport' | translate }}</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-item lines="none">
      <ion-label>{{ 'diary.entriesIncludeSystem' | translate }}</ion-label>
      <ion-toggle
        [(ngModel)]="includeSystemEntries"
        (ionChange)="onIncludeSystemEntriesChange()"
      ></ion-toggle>
    </ion-item>

    <ion-item *ngIf="loading">
      <ion-spinner name="dots"></ion-spinner>
      <ion-label>{{ 'misc.loading' | translate }}</ion-label>
    </ion-item>

    <app-log-category-selector
      *ngIf="!loading && availableLogCategories.length > 0"
      [availableCategories]="availableLogCategories"
      [selectedCategories]="selectedLogCategories"
      (selectedCategoriesChange)="logCategoryChanged($event)"
    ></app-log-category-selector>

    <ion-item *ngIf="!loading && logs.length === 0">
      <ion-label>{{ 'diary.entriesNoData' | translate }}</ion-label>
    </ion-item>

    <app-log-entry-viewer
      *ngIf="!loading && logs.length > 0"
      [logs]="logs"
      [itemsPerPage]="100"
      [showPagination]="logs.length > 100"
      [selectedCategories]="selectedLogCategories"
      [showCategories]="true"
      [showEdit]="true"
      [showDelete]="true"
      (imageOpen)="openImageModal($event.log, $event.imageIndex)"
      (edit)="openEditModal($event)"
      (delete)="deleteLog($event)"
      (showAll)="disableLogGrouping()"
    ></app-log-entry-viewer>
  </ion-card-content>
</ion-card>
